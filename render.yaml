services:
  - type: web
    name: agricane-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: API_PREFIX
        value: api/v1
      - key: ALLOW_PUBLIC_REGISTER
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: COPERNICUS_CLIENT_ID
        sync: false
      - key: COPERNICUS_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFICATION_FROM
        value: noreply@agricane.com
